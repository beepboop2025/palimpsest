<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8">
<title>登录 - 微博</title></head>
<body>
<div class="loginBox">
  <p>请登录后查看此内容。</p>
  <form action="https://passport.weibo.com/sso/signin">
    <input name="username" placeholder="邮箱/手机号">
    <input name="password" type="password">
    <button>立即登录</button>
  </form>
</div>
</body></html>

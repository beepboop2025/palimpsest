name: Refresh vantage fusion

# Fuse the three China network-censorship vantages (OONI in-country, Censored
# Planet remote, net4people community) into one calibrated anomaly rate with a
# corroboration measure. Pure local recomputation over the committed vantage
# readings (no network), stdlib-only, deterministic — anyone can reproduce the
# fused number offline. Runs after the vantage refreshers each cycle.

on:
  schedule:
    - cron: "51 */6 * * *"     # every 6 hours, after the vantage pulls
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: vantage-fusion-refresh
  cancel-in-progress: false

jobs:
  vantage-fusion:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Fuse the censorship vantages
        run: python -m scripts.vantage_fusion_pull

      - name: Commit & push if the fused reading changed
        run: |
          git config user.name  "palimpsest-bot"
          git config user.email "bot@palimpsest.info"
          git add readings/vantage-fusion-latest.json readings/vantage-fusion-history.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "data: vantage fusion refresh ($(date -u +%FT%TZ)) [skip ci]"
            git pull --rebase origin main || true
            git push
          fi

name: Refresh Information Erasure Observatory

# The unifying signal. Reads the latest per-surface readings (OONI GFW network
# layer, Generative Firewall model layer, Baike redaction narrative layer when
# present), seals each raw reading into the tamper-evident ledger at capture
# time, and publishes the composite Erasure Index plus the ledger's integrity
# proof. Re-measures nothing; stdlib-only, key-less, vantage-insensitive. Runs
# after the per-surface signals so it seals fresh readings.

on:
  schedule:
    - cron: "17 */6 * * *"      # every 6h, offset from the per-surface signals
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: erasure-refresh
  cancel-in-progress: false

jobs:
  erasure:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Verify the ledger before sealing (fail loud on any prior tamper)
        run: python -m scripts.verify_ledger

      - name: Refresh the narrative layer (Baike redaction-diff)
        # Inert (instant honest abstain) unless a China-reachable egress secret is set;
        # when PALIMPSEST_PROXY is configured this goes live and produces a real index.
        env:
          PALIMPSEST_PROXY: ${{ secrets.PALIMPSEST_PROXY }}
        run: python -m scripts.baike_redaction_pull

      - name: Seal current readings and publish the composite index
        run: python -m scripts.erasure_pull

      - name: Refresh the Verifiable Eval Registry (seal model-erasure audit)
        run: python -m scripts.eval_registry_ingest

      - name: Frontier refusal-drift audit (real model; abstains without a key)
        # Seals a fresh run of a Western frontier model and records drift vs the last run.
        # Abstains cleanly if OPENROUTER_API_KEY is not configured as a repo secret.
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python -m scripts.refusal_drift_pull

      - name: Verify the eval registry (chain + pre-registration rule)
        run: python -m scripts.verify_eval_registry

      - name: Anchor the roots outside our infrastructure
        # Wayback snapshots the served chain files (a third-party dated copy;
        # it may lag one refresh behind the just-sealed state until Pages
        # rebuilds — still a valid prefix witness). OpenTimestamps stamps the
        # NEW roots into Bitcoin precisely; the .ots proofs commit below and
        # verify with the standard client against the blockchain, not against
        # us. Idempotent: skips entirely when the roots did not move.
        run: |
          pip install --quiet opentimestamps-client
          python -m scripts.anchor_roots

      - name: Commit & push if anything changed
        run: |
          git config user.name  "palimpsest-bot"
          git config user.email "bot@palimpsest.info"
          git add readings/erasure-observatory-latest.json \
                  readings/erasure-observatory-history.jsonl \
                  readings/erasure-ledger.jsonl \
                  readings/baike-redaction-latest.json \
                  readings/baike-redaction-history.jsonl \
                  readings/eval-registry.jsonl \
                  readings/eval-registry-latest.json \
                  readings/refusal-drift-latest.json \
                  readings/refusal-drift-history.jsonl \
                  readings/anchors.jsonl \
                  readings/anchors-latest.json \
                  readings/anchors/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "data: erasure observatory refresh ($(date -u +%FT%TZ)) [skip ci]"
            git pull --rebase origin main || true
            git push
          fi

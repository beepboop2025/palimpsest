name: Refresh Weibo hot-search signal

# The allowed-attention denominator: Sina Weibo hot-search board via the
# MIT-licensed community archive (justjavac/weibo-trending-hot-search,
# hourly captures archived per day, keyless raw fetch). Joined against the
# live DDTI ranking to separate CONTAINED_VISIBLE (deleted yet trending)
# from SUPPRESSED_INVISIBLE (deleted and denied attention). Stdlib-only,
# vantage-insensitive — runs correctly from a GitHub runner.

on:
  schedule:
    - cron: "41 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: weibo-hotsearch-refresh
  cancel-in-progress: false

jobs:
  weibo-hotsearch:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Pull the hot-search archive and publish the join signal
        run: python -m scripts.weibo_hotsearch_pull

      - name: Commit & push if the signal changed
        run: |
          git config user.name  "palimpsest-bot"
          git config user.email "bot@palimpsest.info"
          git add readings/weibo-hotsearch-latest.json readings/weibo-hotsearch-history.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "data: weibo hot-search signal refresh ($(date -u +%FT%TZ)) [skip ci]"
            git pull --rebase origin main || true
            git push
          fi

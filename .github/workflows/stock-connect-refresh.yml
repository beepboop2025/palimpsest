name: Refresh Stock Connect telemetry

# HKEX Stock Connect daily statistics — southbound NET flow (the buy/sell
# split HKEX still prints) plus northbound turnover (the direction print
# was discontinued Aug-2024; that narrowing is itself part of the record).
# Per-day files are keyless but retention is roughly the current calendar
# year, so the git history file is the long record. Stdlib-only,
# vantage-insensitive — runs correctly from a GitHub runner.

on:
  schedule:
    - cron: "23 13 * * 1-5"    # 21:23 HKT — well after the daily print
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: stock-connect-refresh
  cancel-in-progress: false

jobs:
  stock-connect:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Pull HKEX daily stats and publish the stock-connect signal
        run: python -m scripts.stock_connect_pull

      - name: Commit & push if the signal changed
        run: |
          git config user.name  "palimpsest-bot"
          git config user.email "bot@palimpsest.info"
          git add readings/stock-connect-latest.json readings/stock-connect-history.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "data: stock connect telemetry refresh ($(date -u +%FT%TZ)) [skip ci]"
            git pull --rebase origin main || true
            git push
          fi
